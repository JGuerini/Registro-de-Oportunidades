<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <link rel="stylesheet" href="../assets/style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="../assets/auth.js"></script>
  <script src="../assets/db.js"></script>
  <style>
    .search-bar { display:flex;gap:10px;margin-bottom:24px; }
    .search-bar input { flex:1; }
    .result-list { display:flex;flex-direction:column;gap:8px;margin-bottom:24px; }
    .result-item { display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface);border-radius:12px;border:1.5px solid var(--border);cursor:pointer;transition:border-color 0.2s; }
    .result-item:hover { border-color:var(--text); }
    .result-item-name { font-weight:600;font-size:14px; }
    .result-item-sub { font-size:12px;color:var(--text-muted);margin-top:2px; }
    #editForm { display:none; }
    .spinner-inline { display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px; }
    .loading { display:flex;align-items:center;gap:10px;color:var(--text-muted);font-size:13px;padding:30px 0; }
    .spinner { width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin 0.7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <h1>Modificar Oportunidad</h1>
  <p class="subtitle">Buscá y editá una oportunidad existente.</p>
  <div id="alertBox" class="alert"></div>

  <div id="searchSection">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Buscar por nombre, empresa o ID..." oninput="doSearch()"/>
    </div>
    <div id="loadingSearch" class="loading" style="display:none"><div class="spinner"></div> Cargando...</div>
    <div class="result-list" id="resultList"></div>
    <div id="emptySearch" style="display:none" class="empty">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">Sin resultados</div>
    </div>
  </div>

  <div id="editForm">
    <div class="page-actions">
      <div>
        <div style="font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:0.05em;text-transform:uppercase">Editando oportunidad</div>
        <div style="font-size:18px;font-weight:700;margin-top:2px" id="editTitle">—</div>
      </div>
      <button class="btn btn-ghost" onclick="backToSearch()">← Volver</button>
    </div>
    <div class="card">
      <form id="modForm" onsubmit="handleUpdate(event)">
        <input type="hidden" id="editId"/>
        <div style="font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)">Información General</div>
        <div class="form-grid" style="margin-bottom:24px">
          <div class="form-group full"><label>Nombre *</label><input type="text" id="e_nombre" required/></div>
          <div class="form-group"><label>Empresa / Cliente *</label><input type="text" id="e_empresa" required/></div>
          <div class="form-group"><label>Contacto</label><input type="text" id="e_contacto"/></div>
          <div class="form-group"><label>Email</label><input type="email" id="e_email"/></div>
          <div class="form-group"><label>Teléfono</label><input type="text" id="e_telefono"/></div>
        </div>
        <div style="font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)">Datos Comerciales</div>
        <div class="form-grid" style="margin-bottom:24px">
          <div class="form-group"><label>Valor Estimado</label><input type="number" id="e_valor" min="0"/></div>
          <div class="form-group"><label>Moneda</label><select id="e_moneda"><option>USD</option><option>ARS</option><option>EUR</option></select></div>
          <div class="form-group"><label>Etapa *</label><select id="e_etapa" required></select></div>
          <div class="form-group"><label>Probabilidad (%)</label><input type="number" id="e_prob" min="0" max="100"/></div>
          <div class="form-group"><label>Fecha Cierre Est.</label><input type="date" id="e_fechaCierre"/></div>
          <div class="form-group"><label>Responsable</label><input type="text" id="e_responsable"/></div>
          <div class="form-group"><label>Origen</label><select id="e_origen"></select></div>
          <div class="form-group"><label>Estado</label><select id="e_estado"></select></div>
          <div class="form-group full"><label>Producto / Servicio</label><input type="text" id="e_producto"/></div>
          <div class="form-group full"><label>Descripción</label><textarea id="e_descripcion"></textarea></div>
          <div class="form-group full"><label>Próximo Paso</label><input type="text" id="e_proximoPaso"/></div>
          <div class="form-group full"><label>Notas</label><textarea id="e_notas"></textarea></div>
        </div>
        <div style="display:flex;gap:12px;justify-content:space-between;flex-wrap:wrap">
          <button type="button" class="btn btn-danger" onclick="handleDelete()">🗑 Eliminar</button>
          <div style="display:flex;gap:12px">
            <button type="button" class="btn btn-ghost" onclick="backToSearch()">Cancelar</button>
            <button type="submit" class="btn btn-primary" id="updateBtn">Guardar Cambios →</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script>
    const _session = AUTH.requireAuth(); if(!_session) throw new Error("no auth");
    ['e_etapa','e_origen','e_estado'].forEach((id,i) => {
      const opts = [CRM.ETAPAS,CRM.ORIGENES,CRM.ESTADOS][i];
      document.getElementById(id).innerHTML = '<option value="">—</option>' + opts.map(o=>`<option>${o}</option>`).join('');
    });

    let allRows = [];

    async function loadAll() {
      document.getElementById('loadingSearch').style.display = 'flex';
      allRows = await CRM.getData(true);
      document.getElementById('loadingSearch').style.display = 'none';
      doSearch();
    }

    function doSearch() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      const filtered = q
        ? allRows.filter(r =>
            (r['Nombre de Oportunidad']||'').toLowerCase().includes(q) ||
            (r['Empresa / Cliente']||'').toLowerCase().includes(q) ||
            (r['ID']||'').toLowerCase().includes(q))
        : allRows.slice(-20).reverse();

      const list = document.getElementById('resultList');
      const empty = document.getElementById('emptySearch');
      if (filtered.length===0) { list.innerHTML=''; empty.style.display='block'; return; }
      empty.style.display='none';
      list.innerHTML = filtered.slice(0,20).map(r=>`
        <div class="result-item" onclick="loadItem('${r['ID']}')">
          <div>
            <div class="result-item-name">${r['Nombre de Oportunidad']||'—'}</div>
            <div class="result-item-sub">${r['Empresa / Cliente']||'—'} · ID #${r['ID']}</div>
          </div>
          <span class="badge ${badgeClass(r['Etapa'])}">${r['Etapa']||'—'}</span>
        </div>`).join('');
    }

    function loadItem(id) {
      const r = allRows.find(x => x['ID']===id);
      // Verificar permisos: usuario solo puede editar sus propias oportunidades
      if (_session && _session.perfil !== 'admin' && r && r['Responsable'] !== _session.nombre) {
        alert('Solo podés editar oportunidades que te pertenecen.');
        return;
      }
      // Ocultar botón eliminar si no es admin
      const delBtn = document.querySelector('.btn-danger');
      if (delBtn) delBtn.style.display = _session && _session.perfil === 'admin' ? '' : 'none';
      if (!r) return;
      document.getElementById('editId').value = id;
      document.getElementById('editTitle').textContent = r['Nombre de Oportunidad'];
      document.getElementById('e_nombre').value = r['Nombre de Oportunidad']||'';
      document.getElementById('e_empresa').value = r['Empresa / Cliente']||'';
      document.getElementById('e_contacto').value = r['Contacto']||'';
      document.getElementById('e_email').value = r['Email']||'';
      document.getElementById('e_telefono').value = r['Teléfono']||'';
      document.getElementById('e_valor').value = r['Valor Estimado (USD)']||'';
      document.getElementById('e_moneda').value = r['Moneda']||'USD';
      document.getElementById('e_etapa').value = r['Etapa']||'';
      document.getElementById('e_prob').value = r['Probabilidad (%)']||'';
      document.getElementById('e_fechaCierre').value = r['Fecha Cierre Est.']||'';
      document.getElementById('e_responsable').value = r['Responsable']||'';
      document.getElementById('e_origen').value = r['Origen']||'';
      document.getElementById('e_estado').value = r['Estado']||'';
      document.getElementById('e_producto').value = r['Producto / Servicio']||'';
      document.getElementById('e_descripcion').value = r['Descripción']||'';
      document.getElementById('e_proximoPaso').value = r['Próximo Paso']||'';
      document.getElementById('e_notas').value = r['Notas']||'';
      document.getElementById('searchSection').style.display = 'none';
      document.getElementById('editForm').style.display = 'block';
      window.scrollTo(0,0);
    }

    function backToSearch() {
      document.getElementById('searchSection').style.display = 'block';
      document.getElementById('editForm').style.display = 'none';
      loadAll();
    }

    async function handleUpdate(e) {
      e.preventDefault();
      const id = document.getElementById('editId').value;
      const btn = document.getElementById('updateBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-inline"></span>Guardando...';
      const data = {
        'Nombre de Oportunidad': document.getElementById('e_nombre').value,
        'Empresa / Cliente': document.getElementById('e_empresa').value,
        'Contacto': document.getElementById('e_contacto').value,
        'Email': document.getElementById('e_email').value,
        'Teléfono': document.getElementById('e_telefono').value,
        'Valor Estimado (USD)': document.getElementById('e_valor').value||'0',
        'Moneda': document.getElementById('e_moneda').value,
        'Etapa': document.getElementById('e_etapa').value,
        'Probabilidad (%)': document.getElementById('e_prob').value,
        'Fecha Cierre Est.': document.getElementById('e_fechaCierre').value,
        'Responsable': document.getElementById('e_responsable').value,
        'Origen': document.getElementById('e_origen').value,
        'Estado': document.getElementById('e_estado').value,
        'Producto / Servicio': document.getElementById('e_producto').value,
        'Descripción': document.getElementById('e_descripcion').value,
        'Próximo Paso': document.getElementById('e_proximoPaso').value,
        'Notas': document.getElementById('e_notas').value,
      };
      try {
        await CRM.updateOportunidad(id, data);
        showAlert('✓ Oportunidad actualizada correctamente.', 'success');
        backToSearch();
      } catch(err) {
        showAlert('✗ Error al actualizar. Intentá de nuevo.', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Guardar Cambios →';
      }
    }

    async function handleDelete() {
      const id = document.getElementById('editId').value;
      const name = document.getElementById('editTitle').textContent;
      if (!confirm(`¿Seguro que querés eliminar "${name}"?`)) return;
      try {
        await CRM.deleteOportunidad(id);
        showAlert('Oportunidad eliminada.', 'success');
        backToSearch();
      } catch(err) {
        showAlert('✗ Error al eliminar. Intentá de nuevo.', 'error');
      }
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.textContent = msg;
      box.className = `alert alert-${type} show`;
      setTimeout(() => box.className = 'alert', 5000);
    }

    function badgeClass(e) { return {'Prospecto':'badge-prospecto','Calificación':'badge-calificación','Propuesta':'badge-propuesta','Negociación':'badge-negociación','Cerrado Ganado':'badge-ganado','Cerrado Perdido':'badge-perdido'}[e]||''; }

    loadAll();
  </script>
</body>
</html>
