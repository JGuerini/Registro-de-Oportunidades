<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <link rel="stylesheet" href="../assets/style.css"/>
  <script src="../assets/auth.js"></script>
  <script src="../assets/theme.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="../assets/db.js"></script>
  <style>
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
    .two-col-form { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 16px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .section-block { margin-bottom: 28px; }
    .search-bar { display:flex; gap:10px; margin-bottom:24px; }
    .search-bar input { flex:1; }
    .result-list { display:flex; flex-direction:column; gap:8px; margin-bottom:24px; }
    .result-item {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 18px; background:var(--surface); border-radius:12px;
      border:1.5px solid var(--border); cursor:pointer; transition:border-color 0.2s;
    }
    .result-item:hover { border-color:var(--text); }
    .result-item-name { font-weight:600; font-size:14px; }
    .result-item-sub { font-size:12px; color:var(--text-muted); margin-top:2px; }
    #editForm { display:none; }
    .spinner-inline {
      display:inline-block; width:14px; height:14px;
      border:2px solid rgba(255,255,255,0.3); border-top-color:#fff;
      border-radius:50%; animation:spin 0.7s linear infinite;
      vertical-align:middle; margin-right:6px;
    }
    .loading { display:flex; align-items:center; gap:10px; color:var(--text-muted); font-size:13px; padding:30px 0; }
    .spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--text); border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .tcv-eur-display {
      display:flex; align-items:center;
      background:var(--bg); border:1.5px solid var(--border);
      border-radius:10px; padding:10px 14px;
      font-size:13px; font-weight:600; color:var(--text); min-height:42px;
    }
    .fx-badge {
      display:inline-flex; align-items:center; gap:6px;
      font-size:11px; font-weight:600; color:var(--accent);
      background:color-mix(in srgb, var(--accent) 10%, transparent);
      border-radius:6px; padding:3px 8px; margin-left:8px;
    }
    .fx-loading { color:var(--text-muted); font-weight:500; font-size:12px; }
  </style>
</head>
<body>
  <h1>Modificar Oportunidad</h1>
  <p class="subtitle">Buscá y editá una oportunidad existente.</p>
  <div id="alertBox" class="alert"></div>

  <!-- SEARCH -->
  <div id="searchSection">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Buscar por cliente, nombre de oportunidad o ID..." oninput="doSearch()"/>
    </div>
    <div id="loadingSearch" class="loading" style="display:none"><div class="spinner"></div> Cargando...</div>
    <div class="result-list" id="resultList"></div>
    <div id="emptySearch" style="display:none" class="empty">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">Sin resultados</div>
    </div>
  </div>

  <!-- EDIT FORM -->
  <div id="editForm">
    <div class="page-actions">
      <div>
        <div style="font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:0.05em;text-transform:uppercase">Editando oportunidad</div>
        <div style="font-size:18px;font-weight:700;margin-top:2px" id="editTitle">—</div>
      </div>
      <button class="btn btn-ghost" onclick="backToSearch()">← Volver</button>
    </div>

    <div class="card">
      <form id="modForm" onsubmit="handleUpdate(event)">
        <input type="hidden" id="editId"/>

        <!-- INFORMACIÓN GENERAL -->
        <div class="section-block">
          <div class="section-title">Información General</div>
          <div class="three-col" style="margin-bottom:18px">
            <div class="form-group">
              <label>Cliente *</label>
              <input type="text" id="e_cliente" required/>
            </div>
            <div class="form-group">
              <label>Industria</label>
              <select id="e_industria">
                <option value="">— Seleccionar —</option>
                <option>Agroindustria</option>
                <option>Alimenticia</option>
                <option>Automotriz</option>
                <option>eCommerce</option>
                <option>Energía</option>
                <option>Industria/Tecnología</option>
                <option>Medios</option>
                <option>Oil&amp;Gas</option>
                <option>Retail</option>
                <option>Salud</option>
                <option>Sector Público</option>
                <option>Seguros</option>
                <option>Servicios Financieros</option>
                <option>Telecomunicaciones</option>
                <option>Transporte y Logística</option>
              </select>
            </div>
            <div class="form-group">
              <label>Práctica / Área *</label>
              <select id="e_practica" required>
                <option value="">— Seleccionar —</option>
                <option>AM</option>
                <option>CES</option>
                <option>Consultoría</option>
                <option>DWP</option>
                <option>Enablon</option>
                <option>HCI</option>
                <option>IA</option>
                <option>SAP</option>
                <option>Testing</option>
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:18px">
            <label>Nombre de la Oportunidad *</label>
            <input type="text" id="e_nombre" required/>
          </div>
          <div class="form-group" style="margin-bottom:18px">
            <label>Descripción</label>
            <textarea id="e_descripcion"></textarea>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label>Origen *</label>
            <select id="e_origen" required>
              <option value="">— Seleccionar —</option>
              <option>Fertilización</option>
              <option>Otro</option>
              <option>Proyecto</option>
              <option>Renovación</option>
              <option>RFP</option>
            </select>
          </div>
        </div>

        <!-- BID -->
        <div class="section-block">
          <div class="section-title">BID</div>
          <div class="two-col-form" style="margin-bottom:18px">
            <div class="form-group">
              <label>Responsable *</label>
              <input type="text" id="e_responsable" required/>
            </div>
            <div class="form-group">
              <label>Estado *</label>
              <select id="e_estado" required>
                <option value="">— Seleccionar —</option>
                <option>En Desarrollo</option>
                <option>Entregada</option>
                <option>Finalizada</option>
              </select>
            </div>
          </div>
          <div class="two-col-form" style="margin-bottom:18px">
            <div class="form-group">
              <label>Fecha de Inicio *</label>
              <input type="date" id="e_fechaInicio" required/>
            </div>
            <div class="form-group">
              <label>Fecha de Entrega *</label>
              <input type="date" id="e_fechaEntrega" required/>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label>Notas</label>
            <textarea id="e_notas"></textarea>
          </div>
        </div>

        <!-- DATOS COMERCIALES -->
        <div class="section-block">
          <div class="section-title">Datos Comerciales</div>
          <div class="three-col" style="margin-bottom:18px">
            <div class="form-group">
              <label>TCV</label>
              <input type="number" id="e_tcv" placeholder="0" min="0" oninput="calcTCVEur()"/>
            </div>
            <div class="form-group">
              <label>Currency</label>
              <select id="e_currency" onchange="fetchFX()">
                <option value="">— Seleccionar —</option>
                <option>ARS</option>
                <option>CLP</option>
                <option>EUR</option>
                <option>USD</option>
              </select>
            </div>
            <div class="form-group">
              <label>% PM</label>
              <input type="number" id="e_pm" placeholder="0" min="0" max="100" step="0.1"/>
            </div>
          </div>
          <div class="two-col-form" style="margin-bottom:18px">
            <div class="form-group">
              <label>TCV EUR <span id="e_fxBadge" class="fx-badge" style="display:none"></span></label>
              <div class="tcv-eur-display" id="e_tcvEurDisplay">
                <span id="e_tcvEurValue" class="fx-loading">—</span>
              </div>
              <input type="hidden" id="e_tcvEur"/>
            </div>
            <div class="form-group">
              <label>Tipo de Cambio</label>
              <input type="number" id="e_tipoCambio" placeholder="—" step="0.0001"
                oninput="calcTCVEur()" readonly
                style="background:var(--bg);color:var(--text-muted)"/>
            </div>
          </div>
          <div class="form-group" style="max-width:200px">
            <label>% Probabilidad</label>
            <input type="number" id="e_probabilidad" placeholder="0" min="0" max="100" step="1"/>
          </div>
        </div>

        <div style="display:flex;gap:12px;justify-content:space-between;flex-wrap:wrap">
          <button type="button" class="btn btn-danger" id="btnDelete" onclick="handleDelete()">🗑 Eliminar</button>
          <div style="display:flex;gap:12px">
            <button type="button" class="btn btn-ghost" onclick="backToSearch()">Cancelar</button>
            <button type="submit" class="btn btn-primary" id="updateBtn">Guardar Cambios →</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script>
    const _session = AUTH.requireAuth(); if(!_session) throw new Error("no auth");
    let allRows = [];
    let _fxRate = null;

    async function loadAll() {
      document.getElementById('loadingSearch').style.display = 'flex';
      allRows = await CRM.getData(true);
      document.getElementById('loadingSearch').style.display = 'none';
      doSearch();
    }

    function doSearch() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      const filtered = q
        ? allRows.filter(r =>
            (r['Cliente']||'').toLowerCase().includes(q) ||
            (r['Nombre de la Oportunidad']||'').toLowerCase().includes(q) ||
            (r['ID']||'').toLowerCase().includes(q))
        : allRows.slice(-20).reverse();

      const list = document.getElementById('resultList');
      const empty = document.getElementById('emptySearch');
      if (filtered.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      list.innerHTML = filtered.slice(0,20).map(r => `
        <div class="result-item" onclick="loadItem('${r['ID']}')">
          <div>
            <div class="result-item-name">${r['Nombre de la Oportunidad']||'—'}</div>
            <div class="result-item-sub">${r['Cliente']||'—'} · ID #${r['ID']}</div>
          </div>
          <span class="badge ${badgeEstado(r['Estado'])}">${r['Estado']||'—'}</span>
        </div>`).join('');
    }

    function loadItem(id) {
      const r = allRows.find(x => x['ID'] === id);
      if (!r) return;

      if (_session.perfil !== 'admin' && r['Responsable'] !== _session.nombre) {
        alert('Solo podés editar oportunidades que te pertenecen.');
        return;
      }

      document.getElementById('editId').value = id;
      document.getElementById('editTitle').textContent = r['Nombre de la Oportunidad'];
      document.getElementById('e_cliente').value       = r['Cliente']||'';
      document.getElementById('e_industria').value     = r['Industria']||'';
      document.getElementById('e_practica').value      = r['Práctica/Área']||'';
      document.getElementById('e_nombre').value        = r['Nombre de la Oportunidad']||'';
      document.getElementById('e_descripcion').value   = r['Descripción']||'';
      document.getElementById('e_origen').value        = r['Origen']||'';
      document.getElementById('e_responsable').value   = r['Responsable']||'';
      document.getElementById('e_estado').value        = r['Estado']||'';
      document.getElementById('e_fechaInicio').value   = r['Fecha de Inicio']||'';
      document.getElementById('e_fechaEntrega').value  = r['Fecha de Entrega']||'';
      document.getElementById('e_notas').value         = r['Notas']||'';
      document.getElementById('e_tcv').value           = r['TCV']||'';
      document.getElementById('e_currency').value      = r['Currency']||'';
      document.getElementById('e_pm').value            = r['% PM']||'';
      document.getElementById('e_tipoCambio').value    = r['Tipo de Cambio']||'';
      document.getElementById('e_tcvEur').value        = r['TCV EUR']||'';
      document.getElementById('e_probabilidad').value  = r['% Probabilidad']||'';

      // Show saved TCV EUR
      const eur = parseFloat(r['TCV EUR']);
      const tcvEurVal = document.getElementById('e_tcvEurValue');
      if (eur) {
        tcvEurVal.className = '';
        tcvEurVal.textContent = '€ ' + eur.toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2});
      } else {
        tcvEurVal.className = 'fx-loading';
        tcvEurVal.textContent = '—';
      }

      // Show FX badge if we have rate and currency
      if (r['Tipo de Cambio'] && r['Currency']) {
        const badge = document.getElementById('e_fxBadge');
        badge.style.display = 'inline-flex';
        badge.textContent = `1 ${r['Currency']} = ${parseFloat(r['Tipo de Cambio']).toFixed(4)} EUR`;
        _fxRate = parseFloat(r['Tipo de Cambio']);
      }

      // Permisos
      document.getElementById('btnDelete').style.display = _session.perfil === 'admin' ? '' : 'none';
      if (_session.perfil !== 'admin') document.getElementById('e_responsable').readOnly = true;

      document.getElementById('searchSection').style.display = 'none';
      document.getElementById('editForm').style.display = 'block';
      window.scrollTo(0,0);
    }

    function backToSearch() {
      document.getElementById('searchSection').style.display = 'block';
      document.getElementById('editForm').style.display = 'none';
      _fxRate = null;
      loadAll();
    }

    async function fetchFX() {
      const currency = document.getElementById('e_currency').value;
      if (!currency || currency === 'EUR') {
        _fxRate = currency === 'EUR' ? 1 : null;
        document.getElementById('e_tipoCambio').value = currency === 'EUR' ? 1 : '';
        document.getElementById('e_fxBadge').style.display = 'none';
        calcTCVEur(); return;
      }
      document.getElementById('e_tcvEurValue').className = 'fx-loading';
      document.getElementById('e_tcvEurValue').textContent = 'Obteniendo tipo de cambio...';
      document.getElementById('e_fxBadge').style.display = 'none';
      try {
        const res = await fetch(`https://api.exchangerate-api.com/v4/latest/${currency}`);
        const data = await res.json();
        _fxRate = data.rates['EUR'];
        document.getElementById('e_tipoCambio').value = _fxRate.toFixed(6);
        const badge = document.getElementById('e_fxBadge');
        badge.style.display = 'inline-flex';
        badge.textContent = `1 ${currency} = ${_fxRate.toFixed(4)} EUR`;
        calcTCVEur();
      } catch(e) {
        document.getElementById('e_tcvEurValue').textContent = 'Error al obtener tipo de cambio';
      }
    }

    function calcTCVEur() {
      const tcv = parseFloat(document.getElementById('e_tcv').value) || 0;
      const fx  = parseFloat(document.getElementById('e_tipoCambio').value) || _fxRate;
      const currency = document.getElementById('e_currency').value;
      const display = document.getElementById('e_tcvEurValue');
      if (!currency || !fx || !tcv) {
        display.className = 'fx-loading';
        display.textContent = tcv && !currency ? 'Seleccioná moneda' : (tcv ? 'Obteniendo tipo de cambio...' : '—');
        document.getElementById('e_tcvEur').value = '';
        return;
      }
      const eur = tcv * fx;
      display.className = '';
      display.textContent = '€ ' + eur.toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2});
      document.getElementById('e_tcvEur').value = eur.toFixed(2);
    }

    async function handleUpdate(e) {
      e.preventDefault();
      const id = document.getElementById('editId').value;
      const btn = document.getElementById('updateBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-inline"></span>Guardando...';
      const data = {
        'Cliente':                  document.getElementById('e_cliente').value,
        'Industria':                document.getElementById('e_industria').value,
        'Práctica/Área':            document.getElementById('e_practica').value,
        'Nombre de la Oportunidad': document.getElementById('e_nombre').value,
        'Descripción':              document.getElementById('e_descripcion').value,
        'Origen':                   document.getElementById('e_origen').value,
        'Responsable':              document.getElementById('e_responsable').value,
        'Estado':                   document.getElementById('e_estado').value,
        'Fecha de Inicio':          document.getElementById('e_fechaInicio').value,
        'Fecha de Entrega':         document.getElementById('e_fechaEntrega').value,
        'Notas':                    document.getElementById('e_notas').value,
        'TCV':                      document.getElementById('e_tcv').value||'0',
        'Currency':                 document.getElementById('e_currency').value,
        'TCV EUR':                  document.getElementById('e_tcvEur').value||'0',
        'Tipo de Cambio':           document.getElementById('e_tipoCambio').value||'',
        '% Probabilidad':           document.getElementById('e_probabilidad').value||'',
        '% PM':                     document.getElementById('e_pm').value||'',
      };
      try {
        await CRM.updateOportunidad(id, data);
        showAlert('✓ Oportunidad actualizada correctamente.', 'success');
        backToSearch();
      } catch(err) {
        showAlert('✗ Error al actualizar. Intentá de nuevo.', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Guardar Cambios →';
      }
    }

    async function handleDelete() {
      const id = document.getElementById('editId').value;
      const name = document.getElementById('editTitle').textContent;
      if (!confirm(`¿Seguro que querés eliminar "${name}"?`)) return;
      try {
        await CRM.deleteOportunidad(id);
        showAlert('Oportunidad eliminada.', 'success');
        backToSearch();
      } catch(err) {
        showAlert('✗ Error al eliminar.', 'error');
      }
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.textContent = msg;
      box.className = `alert alert-${type} show`;
      setTimeout(() => box.className = 'alert', 5000);
    }

    function badgeEstado(e) {
      return {'En Desarrollo':'badge-propuesta','Entregada':'badge-calificación','Finalizada':'badge-ganado'}[e]||'';
    }

    loadAll();
  </script>
</body>
</html>
