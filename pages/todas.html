<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <link rel="stylesheet" href="../assets/style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="../assets/db.js"></script>
  <style>
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .filters input, .filters select {
      flex: 1;
      min-width: 140px;
      max-width: 220px;
    }

    .col-valor { text-align: right; font-variant-numeric: tabular-nums; }
    .col-id { color: var(--text-muted); font-size: 12px; }
    .col-action { text-align: center; }

    .btn-sm {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 7px;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      color: var(--text);
      transition: border-color 0.2s;
    }

    .btn-sm:hover { border-color: var(--text); }

    .count-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .sort-th { cursor: pointer; user-select: none; }
    .sort-th:hover { color: var(--text); }
    .sort-icon { margin-left: 4px; }
  </style>
</head>
<body>
  <div class="page-actions">
    <div>
      <h1>Todas las Oportunidades</h1>
      <p class="subtitle" style="margin-bottom:0" id="countLabel">Cargando...</p>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" onclick="CRM.downloadExcel()">↓ Exportar Excel</button>
      <button class="btn btn-primary" onclick="parent.navigateTo('pages/nueva.html')">+ Nueva</button>
    </div>
  </div>

  <div class="filters">
    <input type="text" id="filterSearch" placeholder="Buscar..." oninput="renderTable()"/>
    <select id="filterEtapa" onchange="renderTable()">
      <option value="">Todas las etapas</option>
    </select>
    <select id="filterEstado" onchange="renderTable()">
      <option value="">Todos los estados</option>
    </select>
    <select id="filterResponsable" onchange="renderTable()">
      <option value="">Todos los responsables</option>
    </select>
  </div>

  <div class="card" style="padding:0">
    <div class="table-wrap">
      <table id="mainTable">
        <thead>
          <tr>
            <th class="sort-th" onclick="sort('ID')">ID <span class="sort-icon"></span></th>
            <th class="sort-th" onclick="sort('Nombre de Oportunidad')">Oportunidad <span class="sort-icon"></span></th>
            <th class="sort-th" onclick="sort('Empresa / Cliente')">Empresa <span class="sort-icon"></span></th>
            <th class="sort-th" onclick="sort('Etapa')">Etapa <span class="sort-icon"></span></th>
            <th class="sort-th" onclick="sort('Valor Estimado (USD)')">Valor (USD) <span class="sort-icon"></span></th>
            <th class="sort-th" onclick="sort('Probabilidad (%)')">Prob. <span class="sort-icon"></span></th>
            <th>Responsable</th>
            <th class="sort-th" onclick="sort('Fecha Cierre Est.')">Cierre Est. <span class="sort-icon"></span></th>
            <th>Estado</th>
            <th class="col-action">Acción</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div id="emptyState" class="empty" style="display:none">
      <div class="empty-icon">📋</div>
      <div class="empty-text">Sin oportunidades</div>
      <div class="empty-sub">Comenzá cargando una nueva oportunidad</div>
    </div>
  </div>

  <script>
    let sortKey = 'ID';
    let sortDir = -1;

    // Populate filter selects
    CRM.ETAPAS.forEach(e => {
      document.getElementById('filterEtapa').innerHTML += `<option value="${e}">${e}</option>`;
    });
    CRM.ESTADOS.forEach(s => {
      document.getElementById('filterEstado').innerHTML += `<option value="${s}">${s}</option>`;
    });

    function populateResponsables() {
      const rows = CRM.getData();
      const resps = [...new Set(rows.map(r => r['Responsable']).filter(Boolean))].sort();
      const sel = document.getElementById('filterResponsable');
      sel.innerHTML = '<option value="">Todos los responsables</option>';
      resps.forEach(r => sel.innerHTML += `<option value="${r}">${r}</option>`);
    }

    function getFiltered() {
      const q = document.getElementById('filterSearch').value.trim().toLowerCase();
      const etapa = document.getElementById('filterEtapa').value;
      const estado = document.getElementById('filterEstado').value;
      const resp = document.getElementById('filterResponsable').value;

      return CRM.getData().filter(r => {
        if (etapa && r['Etapa'] !== etapa) return false;
        if (estado && r['Estado'] !== estado) return false;
        if (resp && r['Responsable'] !== resp) return false;
        if (q) {
          const haystack = [r['ID'], r['Nombre de Oportunidad'], r['Empresa / Cliente'], r['Contacto']].join(' ').toLowerCase();
          if (!haystack.includes(q)) return false;
        }
        return true;
      });
    }

    function sort(key) {
      if (sortKey === key) sortDir *= -1;
      else { sortKey = key; sortDir = 1; }
      renderTable();
    }

    function renderTable() {
      const rows = getFiltered().sort((a, b) => {
        let av = a[sortKey] || '', bv = b[sortKey] || '';
        if (!isNaN(parseFloat(av)) && !isNaN(parseFloat(bv))) {
          return (parseFloat(av) - parseFloat(bv)) * sortDir;
        }
        return String(av).localeCompare(String(bv)) * sortDir;
      });

      document.getElementById('countLabel').textContent = `${rows.length} oportunidad${rows.length !== 1 ? 'es' : ''}`;

      const body = document.getElementById('tableBody');
      const empty = document.getElementById('emptyState');

      if (rows.length === 0) {
        body.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      body.innerHTML = rows.map(r => `
        <tr>
          <td class="col-id">#${r['ID']}</td>
          <td style="font-weight:600;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r['Nombre de Oportunidad'] || '—'}</td>
          <td style="color:var(--text-muted)">${r['Empresa / Cliente'] || '—'}</td>
          <td><span class="badge ${badgeClass(r['Etapa'])}">${r['Etapa'] || '—'}</span></td>
          <td class="col-valor">${r['Valor Estimado (USD)'] ? '$' + Number(r['Valor Estimado (USD)']).toLocaleString('es-AR') : '—'}</td>
          <td style="text-align:center">${r['Probabilidad (%)'] ? r['Probabilidad (%)'] + '%' : '—'}</td>
          <td>${r['Responsable'] || '—'}</td>
          <td style="color:var(--text-muted)">${r['Fecha Cierre Est.'] || '—'}</td>
          <td><span class="badge ${badgeClass(r['Estado'])}">${r['Estado'] || '—'}</span></td>
          <td class="col-action">
            <button class="btn-sm" onclick="editRow('${r['ID']}')">Editar</button>
          </td>
        </tr>`).join('');
    }

    function editRow(id) {
      // Load the edit form with the specific ID
      const frame = parent.document.getElementById('contentFrame');
      frame.src = 'pages/modificar.html';
      parent.document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      parent.document.querySelector('[data-page="pages/modificar.html"]').classList.add('active');
      parent.document.getElementById('pageTitle').textContent = 'Modificar Oportunidad';

      frame.onload = function() {
        try { frame.contentWindow.loadItem(id); } catch(e) {}
      };
    }

    function badgeClass(etapa) {
      const map = { 'Prospecto':'badge-prospecto','Calificación':'badge-calificación','Propuesta':'badge-propuesta','Negociación':'badge-negociación','Cerrado Ganado':'badge-ganado','Cerrado Perdido':'badge-perdido','Activa':'badge-activa','En pausa':'badge-pausa','Cerrada':'badge-cerrada' };
      return map[etapa] || '';
    }

    populateResponsables();
    renderTable();
  </script>
</body>
</html>
