<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <link rel="stylesheet" href="../assets/style.css"/>
  <script src="../assets/auth.js"></script>
  <script src="../assets/theme.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="../assets/db.js"></script>
  <style>
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
    .two-col-form { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 16px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .section-block { margin-bottom: 28px; }
    .spinner-inline {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tcv-eur-display {
      display: flex; align-items: center;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      font-size: 13px; font-weight: 600; color: var(--text);
      min-height: 42px;
    }
    .fx-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600; color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border-radius: 6px; padding: 3px 8px; margin-left: 8px;
    }
    .fx-loading { color: var(--text-muted); font-weight: 500; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Nueva Oportunidad</h1>
  <p class="subtitle">Completá los datos para registrar una nueva oportunidad comercial.</p>

  <div id="alertBox" class="alert"></div>

  <div class="card">
    <form id="oportunidadForm" onsubmit="handleSubmit(event)">

      <!-- INFORMACIÓN GENERAL -->
      <div class="section-block">
        <div class="section-title">Información General</div>

        <div class="three-col" style="margin-bottom:18px">
          <div class="form-group">
            <label>Cliente *</label>
            <input type="text" id="f_cliente" placeholder="Nombre del cliente" required/>
          </div>
          <div class="form-group">
            <label>Industria</label>
            <select id="f_industria">
              <option value="">— Seleccionar —</option>
              <option>Agroindustria</option>
              <option>Alimenticia</option>
              <option>Automotriz</option>
              <option>eCommerce</option>
              <option>Energía</option>
              <option>Industria/Tecnología</option>
              <option>Medios</option>
              <option>Oil&amp;Gas</option>
              <option>Retail</option>
              <option>Salud</option>
              <option>Sector Público</option>
              <option>Seguros</option>
              <option>Servicios Financieros</option>
              <option>Telecomunicaciones</option>
              <option>Transporte y Logística</option>
            </select>
          </div>
          <div class="form-group">
            <label>Práctica / Área *</label>
            <select id="f_practica" required>
              <option value="">— Seleccionar —</option>
              <option>AM</option>
              <option>CES</option>
              <option>Consultoría</option>
              <option>DWP</option>
              <option>Enablon</option>
              <option>HCI</option>
              <option>IA</option>
              <option>SAP</option>
              <option>Testing</option>
            </select>
          </div>
        </div>

        <div class="form-group" style="margin-bottom:18px">
          <label>Nombre de la Oportunidad *</label>
          <input type="text" id="f_nombre" placeholder="Ej: Implementación SAP S/4HANA — Cliente XYZ" required/>
        </div>

        <div class="form-group" style="margin-bottom:18px">
          <label>Descripción</label>
          <textarea id="f_descripcion" placeholder="Breve descripción de la oportunidad..."></textarea>
        </div>

        <div class="form-group" style="margin-bottom:0">
          <label>Origen *</label>
          <select id="f_origen" required>
            <option value="">— Seleccionar —</option>
            <option>Fertilización</option>
            <option>Otro</option>
            <option>Proyecto</option>
            <option>Renovación</option>
            <option>RFP</option>
          </select>
        </div>
      </div>

      <!-- BID -->
      <div class="section-block">
        <div class="section-title">BID</div>

        <div class="two-col-form" style="margin-bottom:18px">
          <div class="form-group">
            <label>Responsable *</label>
            <input type="text" id="f_responsable" required/>
          </div>
          <div class="form-group">
            <label>Estado *</label>
            <select id="f_estado" required>
              <option value="">— Seleccionar —</option>
              <option>En Desarrollo</option>
              <option>Entregada</option>
              <option>Finalizada</option>
            </select>
          </div>
        </div>

        <div class="two-col-form" style="margin-bottom:18px">
          <div class="form-group">
            <label>Fecha de Inicio *</label>
            <input type="date" id="f_fechaInicio" required/>
          </div>
          <div class="form-group">
            <label>Fecha de Entrega *</label>
            <input type="date" id="f_fechaEntrega" required/>
          </div>
        </div>

        <div class="form-group" style="margin-bottom:0">
          <label>Notas</label>
          <textarea id="f_notas" placeholder="Notas internas..."></textarea>
        </div>
      </div>

      <!-- DATOS COMERCIALES -->
      <div class="section-block">
        <div class="section-title">Datos Comerciales</div>

        <div class="three-col" style="margin-bottom:18px">
          <div class="form-group">
            <label>TCV</label>
            <input type="number" id="f_tcv" placeholder="0" min="0" oninput="calcTCVEur()"/>
          </div>
          <div class="form-group">
            <label>Currency</label>
            <select id="f_currency" onchange="fetchFX()">
              <option value="">— Seleccionar —</option>
              <option>ARS</option>
              <option>CLP</option>
              <option>EUR</option>
              <option>USD</option>
            </select>
          </div>
          <div class="form-group">
            <label>% PM</label>
            <input type="number" id="f_pm" placeholder="0" min="0" max="100" step="0.1"/>
          </div>
        </div>

        <div class="two-col-form" style="margin-bottom:18px">
          <div class="form-group">
            <label>TCV EUR <span id="fxBadge" class="fx-badge" style="display:none"></span></label>
            <div class="tcv-eur-display" id="tcvEurDisplay">
              <span id="tcvEurValue" class="fx-loading">Seleccioná moneda y TCV</span>
            </div>
            <input type="hidden" id="f_tcvEur"/>
          </div>
          <div class="form-group">
            <label>Tipo de Cambio</label>
            <input type="number" id="f_tipoCambio" placeholder="—" step="0.0001"
              oninput="calcTCVEur()" readonly
              style="background:var(--bg);color:var(--text-muted)"/>
          </div>
        </div>

        <div class="form-group" style="max-width:200px">
          <label>% Probabilidad</label>
          <input type="number" id="f_probabilidad" placeholder="0" min="0" max="100" step="1"/>
        </div>
      </div>

      <div style="display:flex;gap:12px;justify-content:flex-end">
        <button type="button" class="btn btn-ghost" onclick="resetForm()">Limpiar</button>
        <button type="submit" class="btn btn-primary" id="submitBtn">Guardar Oportunidad →</button>
      </div>

    </form>
  </div>

  <script>
    const _session = AUTH.requireAuth(); if(!_session) throw new Error("no auth");

    // Pre-fill responsable
    if (_session) {
      document.getElementById('f_responsable').value = _session.nombre;
      if (_session.perfil !== 'admin') document.getElementById('f_responsable').readOnly = true;
    }

    let _fxRate = null;
    let _fxFrom = null;

    async function fetchFX() {
      const currency = document.getElementById('f_currency').value;
      if (!currency || currency === 'EUR') {
        _fxRate = currency === 'EUR' ? 1 : null;
        _fxFrom = currency || null;
        document.getElementById('f_tipoCambio').value = currency === 'EUR' ? 1 : '';
        document.getElementById('f_tipoCambio').style.color = '';
        document.getElementById('fxBadge').style.display = 'none';
        calcTCVEur();
        return;
      }

      document.getElementById('tcvEurValue').className = 'fx-loading';
      document.getElementById('tcvEurValue').textContent = 'Obteniendo tipo de cambio...';
      document.getElementById('fxBadge').style.display = 'none';

      try {
        const res = await fetch(`https://api.exchangerate-api.com/v4/latest/${currency}`);
        const data = await res.json();
        _fxRate = data.rates['EUR'];
        _fxFrom = currency;
        document.getElementById('f_tipoCambio').value = _fxRate.toFixed(6);
        document.getElementById('f_tipoCambio').style.color = '';

        const badge = document.getElementById('fxBadge');
        badge.style.display = 'inline-flex';
        badge.textContent = `1 ${currency} = ${_fxRate.toFixed(4)} EUR`;

        calcTCVEur();
      } catch(e) {
        document.getElementById('tcvEurValue').textContent = 'Error al obtener tipo de cambio';
        document.getElementById('f_tipoCambio').value = '';
      }
    }

    function calcTCVEur() {
      const tcv = parseFloat(document.getElementById('f_tcv').value) || 0;
      const fx  = parseFloat(document.getElementById('f_tipoCambio').value) || _fxRate;
      const currency = document.getElementById('f_currency').value;
      const display = document.getElementById('tcvEurValue');

      if (!currency) {
        display.className = 'fx-loading';
        display.textContent = 'Seleccioná moneda y TCV';
        document.getElementById('f_tcvEur').value = '';
        return;
      }
      if (!fx) {
        display.className = 'fx-loading';
        display.textContent = 'Obteniendo tipo de cambio...';
        return;
      }
      if (!tcv) {
        display.className = 'fx-loading';
        display.textContent = 'Ingresá el TCV';
        document.getElementById('f_tcvEur').value = '';
        return;
      }

      const eur = tcv * fx;
      display.className = '';
      display.style.color = 'var(--text)';
      display.textContent = '€ ' + eur.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      document.getElementById('f_tcvEur').value = eur.toFixed(2);
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-inline"></span>Guardando...';

      const data = {
        'Cliente':              document.getElementById('f_cliente').value,
        'Industria':            document.getElementById('f_industria').value,
        'Práctica/Área':        document.getElementById('f_practica').value,
        'Nombre de la Oportunidad': document.getElementById('f_nombre').value,
        'Descripción':          document.getElementById('f_descripcion').value,
        'Origen':               document.getElementById('f_origen').value,
        'Responsable':          document.getElementById('f_responsable').value,
        'Estado':               document.getElementById('f_estado').value,
        'Fecha de Inicio':      document.getElementById('f_fechaInicio').value,
        'Fecha de Entrega':     document.getElementById('f_fechaEntrega').value,
        'Notas':                document.getElementById('f_notas').value,
        'TCV':                  document.getElementById('f_tcv').value || '0',
        'Currency':             document.getElementById('f_currency').value,
        'TCV EUR':              document.getElementById('f_tcvEur').value || '0',
        'Tipo de Cambio':       document.getElementById('f_tipoCambio').value || '',
        '% Probabilidad':       document.getElementById('f_probabilidad').value || '',
        '% PM':                 document.getElementById('f_pm').value || '',
      };

      try {
        const id = await CRM.addOportunidad(data);
        showAlert(`✓ Oportunidad #${id} guardada exitosamente.`, 'success');
        resetForm();
        window.scrollTo(0, 0);
      } catch(err) {
        showAlert('✗ Error al guardar. Verificá tu conexión e intentá de nuevo.', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Guardar Oportunidad →';
      }
    }

    function resetForm() {
      document.getElementById('oportunidadForm').reset();
      if (_session) {
        document.getElementById('f_responsable').value = _session.nombre;
      }
      _fxRate = null;
      _fxFrom = null;
      document.getElementById('tcvEurValue').className = 'fx-loading';
      document.getElementById('tcvEurValue').textContent = 'Seleccioná moneda y TCV';
      document.getElementById('fxBadge').style.display = 'none';
      document.getElementById('f_tcvEur').value = '';
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.textContent = msg;
      box.className = `alert alert-${type} show`;
      setTimeout(() => box.className = 'alert', 5000);
    }
  </script>
</body>
</html>
