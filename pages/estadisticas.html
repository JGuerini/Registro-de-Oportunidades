<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <link rel="stylesheet" href="../assets/style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="../assets/db.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 24px;
    }

    @media (max-width: 680px) { .charts-grid { grid-template-columns: 1fr; } }

    .chart-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--border);
    }

    .chart-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .chart-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 18px;
    }

    .chart-wrap {
      position: relative;
      height: 220px;
    }

    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px;
      margin-bottom: 8px;
    }

    .kpi {
      background: var(--surface);
      border-radius: 14px;
      padding: 18px 20px;
      border: 1px solid var(--border);
    }

    .kpi-val {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .kpi-lbl {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .chart-card.full { grid-column: 1 / -1; }

    .funnel-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .funnel-label { font-size: 12px; font-weight: 600; width: 140px; flex-shrink: 0; }
    .funnel-track { flex: 1; background: var(--bg); border-radius: 6px; height: 20px; overflow: hidden; }
    .funnel-fill { height: 100%; border-radius: 6px; transition: width 0.6s; }
    .funnel-count { font-size: 12px; font-weight: 600; color: var(--text-muted); width: 30px; text-align: right; }
  </style>
</head>
<body>
  <h1>Estadísticas</h1>
  <p class="subtitle">Métricas y análisis de tu pipeline comercial.</p>

  <div class="kpi-row" id="kpiRow"></div>

  <div class="charts-grid">
    <!-- Etapas -->
    <div class="chart-card">
      <div class="chart-title">Distribución por Etapa</div>
      <div class="chart-sub">Cantidad de oportunidades</div>
      <div class="chart-wrap"><canvas id="chartEtapas"></canvas></div>
    </div>

    <!-- Valor por etapa -->
    <div class="chart-card">
      <div class="chart-title">Valor por Etapa (USD)</div>
      <div class="chart-sub">Sumatoria estimada</div>
      <div class="chart-wrap"><canvas id="chartValor"></canvas></div>
    </div>

    <!-- Funnel -->
    <div class="chart-card full">
      <div class="chart-title">Funnel de Conversión</div>
      <div class="chart-sub">Oportunidades por etapa del proceso</div>
      <div id="funnelChart" style="padding-top:8px"></div>
    </div>

    <!-- Origen -->
    <div class="chart-card">
      <div class="chart-title">Origen de Oportunidades</div>
      <div class="chart-sub">¿De dónde vienen?</div>
      <div class="chart-wrap"><canvas id="chartOrigen"></canvas></div>
    </div>

    <!-- Responsable -->
    <div class="chart-card">
      <div class="chart-title">Por Responsable</div>
      <div class="chart-sub">Cantidad de oportunidades activas</div>
      <div class="chart-wrap"><canvas id="chartResp"></canvas></div>
    </div>
  </div>

  <script>
    const PALETTE = ['#c8f53c','#0f0f0f','#93c5fd','#fde68a','#86efac','#fca5a5','#fdba74','#e9d5ff','#a7f3d0'];

    Chart.defaults.font.family = "'Montserrat', sans-serif";
    Chart.defaults.font.size = 11;
    Chart.defaults.color = '#888';

    function fmt(n) { return '$' + Number(n).toLocaleString('es-AR'); }

    function render() {
      const rows = CRM.getData();
      const activas = rows.filter(r => r['Estado'] === 'Activa');
      const ganadas = rows.filter(r => r['Etapa'] === 'Cerrado Ganado');
      const perdidas = rows.filter(r => r['Etapa'] === 'Cerrado Perdido');
      const totalVal = activas.reduce((s, r) => s + (parseFloat(r['Valor Estimado (USD)']) || 0), 0);
      const winRate = (ganadas.length + perdidas.length) > 0
        ? Math.round(ganadas.length / (ganadas.length + perdidas.length) * 100) : 0;
      const avgVal = activas.length > 0 ? Math.round(totalVal / activas.length) : 0;
      const probProm = activas.length > 0
        ? Math.round(activas.reduce((s, r) => s + (parseFloat(r['Probabilidad (%)']) || 0), 0) / activas.length) : 0;

      document.getElementById('kpiRow').innerHTML = [
        { v: rows.length, l: 'Total Oportunidades' },
        { v: fmt(totalVal), l: 'Valor Pipeline USD' },
        { v: fmt(avgVal), l: 'Ticket Promedio' },
        { v: winRate + '%', l: 'Win Rate' },
        { v: probProm + '%', l: 'Prob. Promedio' },
      ].map(k => `<div class="kpi"><div class="kpi-val">${k.v}</div><div class="kpi-lbl">${k.l}</div></div>`).join('');

      // Etapas — count
      const etapaCounts = {};
      CRM.ETAPAS.forEach(e => etapaCounts[e] = 0);
      rows.forEach(r => { if (etapaCounts[r['Etapa']] !== undefined) etapaCounts[r['Etapa']]++; });

      new Chart(document.getElementById('chartEtapas'), {
        type: 'doughnut',
        data: {
          labels: CRM.ETAPAS,
          datasets: [{ data: CRM.ETAPAS.map(e => etapaCounts[e]), backgroundColor: PALETTE, borderWidth: 0 }]
        },
        options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, padding: 14 } } }, cutout: '65%', maintainAspectRatio: false }
      });

      // Etapas — valor
      const etapaVal = {};
      CRM.ETAPAS.forEach(e => etapaVal[e] = 0);
      rows.forEach(r => { if (etapaVal[r['Etapa']] !== undefined) etapaVal[r['Etapa']] += parseFloat(r['Valor Estimado (USD)']) || 0; });

      new Chart(document.getElementById('chartValor'), {
        type: 'bar',
        data: {
          labels: CRM.ETAPAS.map(e => e.replace('Cerrado ', '')),
          datasets: [{ data: CRM.ETAPAS.map(e => etapaVal[e]), backgroundColor: PALETTE, borderRadius: 6, borderSkipped: false }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            y: { grid: { color: '#f0ede6' }, ticks: { callback: v => '$' + (v >= 1000 ? (v/1000).toFixed(0) + 'k' : v) } },
            x: { grid: { display: false } }
          },
          maintainAspectRatio: false
        }
      });

      // Funnel
      const funnelEtapas = ['Prospecto', 'Calificación', 'Propuesta', 'Negociación', 'Cerrado Ganado'];
      const funnelColors = ['#cbd5e1', '#fde68a', '#93c5fd', '#fdba74', '#86efac'];
      const maxCount = Math.max(...funnelEtapas.map(e => etapaCounts[e] || 0), 1);

      document.getElementById('funnelChart').innerHTML = funnelEtapas.map((e, i) => `
        <div class="funnel-row">
          <div class="funnel-label">${e}</div>
          <div class="funnel-track">
            <div class="funnel-fill" style="width:${Math.round((etapaCounts[e] || 0) / maxCount * 100)}%;background:${funnelColors[i]}"></div>
          </div>
          <div class="funnel-count">${etapaCounts[e] || 0}</div>
        </div>`).join('');

      // Origen
      const origenCounts = {};
      rows.forEach(r => { if (r['Origen']) origenCounts[r['Origen']] = (origenCounts[r['Origen']] || 0) + 1; });
      const origenKeys = Object.keys(origenCounts);

      new Chart(document.getElementById('chartOrigen'), {
        type: 'pie',
        data: {
          labels: origenKeys.length ? origenKeys : ['Sin datos'],
          datasets: [{ data: origenKeys.length ? origenKeys.map(k => origenCounts[k]) : [1], backgroundColor: PALETTE, borderWidth: 0 }]
        },
        options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, padding: 12 } } }, maintainAspectRatio: false }
      });

      // Responsable
      const respCounts = {};
      activas.forEach(r => { if (r['Responsable']) respCounts[r['Responsable']] = (respCounts[r['Responsable']] || 0) + 1; });
      const respKeys = Object.keys(respCounts).sort((a,b) => respCounts[b]-respCounts[a]).slice(0, 8);

      new Chart(document.getElementById('chartResp'), {
        type: 'bar',
        data: {
          labels: respKeys.length ? respKeys : ['Sin datos'],
          datasets: [{ data: respKeys.length ? respKeys.map(k => respCounts[k]) : [0], backgroundColor: '#0f0f0f', borderRadius: 6, borderSkipped: false }]
        },
        options: {
          indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#f0ede6' }, ticks: { stepSize: 1 } },
            y: { grid: { display: false } }
          },
          maintainAspectRatio: false
        }
      });
    }

    render();
  </script>
</body>
</html>
