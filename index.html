<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRESALES AR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <script src="assets/auth.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f3f7;
      --surface: #ffffff;
      --sidebar-bg: #0f0f0f;
      --sidebar-w: 240px;
      --sidebar-collapsed: 64px;
      --accent: #8a38fe;
      --accent-dark: #6f2ed4;
      --text: #0f0f0f;
      --text-muted: #888;
      --border: #e8e6e0;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .layout {
      display: flex;
      height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      transition: width var(--transition), min-width var(--transition);
      overflow: hidden;
      position: relative;
      z-index: 10;
    }

    .sidebar.collapsed {
      width: var(--sidebar-collapsed);
      min-width: var(--sidebar-collapsed);
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 16px 20px;
      border-bottom: 1px solid #1e1e1e;
      min-height: 72px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg { width: 18px; height: 18px; }

    .logo-text {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.05em;
      white-space: nowrap;
      opacity: 1;
      transition: opacity var(--transition);
    }

    .sidebar.collapsed .logo-text { opacity: 0; }

    .toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #555;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .toggle-btn:hover { color: var(--accent); }

    .toggle-btn svg {
      width: 18px;
      height: 18px;
      transition: transform var(--transition);
    }

    .sidebar.collapsed .toggle-btn svg { transform: rotate(180deg); }

    /* NAV */
    .nav {
      flex: 1;
      padding: 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 12px;
      border-radius: 10px;
      cursor: pointer;
      color: #999;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover {
      background: #1a1a1a;
      color: #fff;
    }

    .nav-item.active {
      background: #1a1a1a;
      color: var(--accent);
    }

    .nav-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .nav-label {
      opacity: 1;
      transition: opacity var(--transition);
      overflow: hidden;
    }

    .sidebar.collapsed .nav-label { opacity: 0; }

    .nav-divider {
      height: 1px;
      background: #1e1e1e;
      margin: 8px 12px;
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid #1e1e1e;
    }

    .version {
      font-size: 10px;
      color: #444;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      transition: opacity var(--transition);
    }

    .sidebar.collapsed .version { opacity: 0; }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 16px;
    }

    .topbar-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.03em;
    }

    .topbar-breadcrumb {
      font-size: 12px;
      color: var(--text-muted);
    }

    .topbar-breadcrumb span {
      color: var(--text);
      font-weight: 500;
    }

    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #aaa;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.conectado {
      background: #22c55e;
      box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
    }
    .status-dot.sincronizando {
      background: #8a38fe;
      box-shadow: 0 0 0 2px rgba(138, 56, 254, 0.2);
      animation: pulse 1s infinite;
    }
    .status-dot.error {
      background: #ef4444;
      box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .status-text {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      transition: color 0.3s;
    }

    .content-frame {
      flex: 1;
      border: none;
      background: var(--bg);
    }

    .nav-section-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #444;
      padding: 4px 12px 4px;
      margin-top: 8px;
      white-space: nowrap;
      overflow: hidden;
      opacity: 1;
      transition: opacity var(--transition);
    }
    .sidebar.collapsed .nav-section-title { opacity: 0; }

    /* Tooltip for collapsed sidebar */
    .nav-item[data-tooltip] {
      position: relative;
    }

    .sidebar.collapsed .nav-item[data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      left: calc(100% + 12px);
      top: 50%;
      transform: translateY(-50%);
      background: #1a1a1a;
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      pointer-events: none;
      z-index: 100;
      border: 1px solid #2a2a2a;
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg fill="none" viewBox="0 0 18 18" stroke="#0f0f0f" stroke-width="2">
            <path d="M2 14 L7 9 L11 13 L16 6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logo-text">PRESALES AR</span>
      </div>
      <button class="toggle-btn" id="toggleBtn" title="Contraer menú">
        <svg fill="none" viewBox="0 0 18 18" stroke="currentColor" stroke-width="2">
          <path d="M11 4L5 9l6 5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <nav class="nav" style="justify-content:flex-start">

      <!-- PRINCIPAL -->
      <div class="nav-section-title">Principal</div>
      <button class="nav-item active" data-page="pages/home.html" data-tooltip="Inicio" onclick="navigate(this)">
        <svg fill="none" viewBox="0 0 18 18" stroke="currentColor" stroke-width="1.8">
          <path d="M2 7.5L9 2l7 5.5V16H12v-4H6v4H2V7.5z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="nav-label">Inicio</span>
      </button>

      <!-- OPORTUNIDADES -->
      <div class="nav-section-title">Oportunidades</div>
      <button class="nav-item" data-page="pages/nueva.html" data-tooltip="Nueva Oportunidad" onclick="navigate(this)">
        <svg fill="none" viewBox="0 0 18 18" stroke="currentColor" stroke-width="1.8">
          <circle cx="9" cy="9" r="7"/>
          <path d="M9 6v6M6 9h6" stroke-linecap="round"/>
        </svg>
        <span class="nav-label">Nueva Oportunidad</span>
      </button>
      <button class="nav-item" data-page="pages/modificar.html" data-tooltip="Modificar" onclick="navigate(this)">
        <svg fill="none" viewBox="0 0 18 18" stroke="currentColor" stroke-width="1.8">
          <path d="M12 2l4 4-9 9H3v-4L12 2z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="nav-label">Modificar Oportunidad</span>
      </button>
      <button class="nav-item" data-page="pages/todas.html" data-tooltip="Ver Todas" onclick="navigate(this)">
        <svg fill="none" viewBox="0 0 18 18" stroke="currentColor" stroke-width="1.8">
          <rect x="2" y="3" width="14" height="3" rx="1"/>
          <rect x="2" y="8" width="14" height="3" rx="1"/>
          <rect x="2" y="13" width="14" height="2" rx="1"/>
        </svg>
        <span class="nav-label">Ver Todas</span>
      </button>

      <!-- ANALISIS -->
      <div class="nav-section-title">Análisis</div>
      <button class="nav-item" data-page="pages/estadisticas.html" data-tooltip="Estadísticas" onclick="navigate(this)">
        <svg fill="none" viewBox="0 0 18 18" stroke="currentColor" stroke-width="1.8">
          <path d="M2 16V10M6 16V6M10 16V8M14 16V2" stroke-linecap="round"/>
        </svg>
        <span class="nav-label">Estadísticas</span>
      </button>

      <div style="flex:1"></div>
      <div class="nav-divider"></div>
      <!-- USUARIO -->
      <div class="nav-section-title">Usuario</div>
      <button class="nav-item" data-page="pages/perfil.html" data-tooltip="Mi Perfil" onclick="navigate(this)">
        <svg fill="none" viewBox="0 0 18 18" stroke="currentColor" stroke-width="1.8">
          <circle cx="9" cy="6" r="3.5"/>
          <path d="M2 17c0-3.9 3.1-7 7-7s7 3.1 7 7" stroke-linecap="round"/>
        </svg>
        <span class="nav-label">Mi Perfil</span>
      </button>
      <button class="nav-item" data-page="pages/usuarios.html" data-tooltip="Usuarios" data-admin onclick="navigate(this)" style="display:none" id="btnUsuarios">
        <svg fill="none" viewBox="0 0 18 18" stroke="currentColor" stroke-width="1.8">
          <circle cx="7" cy="6" r="3"/>
          <path d="M1 16c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke-linecap="round"/>
          <path d="M14 8v4M16 10h-4" stroke-linecap="round"/>
        </svg>
        <span class="nav-label">Usuarios</span>
      </button>

    </nav>

    <div class="sidebar-footer">
      <div class="version">PRESALES AR v1.0</div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-breadcrumb">Oportunidades / <span id="pageTitle">Inicio</span></div>
      <div class="topbar-right">
        <div class="status-dot sincronizando" id="statusDot"></div>
        <span class="status-text" id="statusText">Verificando...</span>
        <div style="width:1px;height:20px;background:var(--border);margin:0 8px"></div>
        <div style="display:flex;align-items:center;gap:8px">
          <div id="userAvatar" style="width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff"></div>
          <div>
            <div id="userName" style="font-size:12px;font-weight:600;color:var(--text);line-height:1.2"></div>
            <div id="userPerfil" style="font-size:10px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:0.05em"></div>
          </div>
          <button onclick="AUTH.logout()" title="Cerrar sesión" style="background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;border-radius:6px;display:flex;align-items:center;transition:color 0.2s" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='var(--text-muted)'">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 18 18">
              <path d="M7 3H3v12h4M12 12l3-3-3-3M15 9H7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <iframe class="content-frame" id="contentFrame" src="pages/home.html"></iframe>
  </main>

</div>

<script>
  // ── Auth check ──
  const session = AUTH.getSession();
  if (!session) { window.location.href = 'login.html'; }

  // Mostrar info del usuario
  const initials = session ? session.nombre.split(' ').map(n=>n[0]).slice(0,2).join('') : '';
  document.getElementById('userAvatar').textContent = initials;
  document.getElementById('userName').textContent = session ? session.nombre.split(' ')[0] + ' ' + (session.nombre.split(' ')[1]||'') : '';
  document.getElementById('userPerfil').textContent = session ? session.perfil : '';

  // Mostrar botón Usuarios solo para admin
  if (session && session.perfil === 'admin') {
    const btnUsuarios = document.getElementById('btnUsuarios');
    if (btnUsuarios) btnUsuarios.style.display = 'flex';
  }

  const sidebar = document.getElementById('sidebar');
  const toggleBtn = document.getElementById('toggleBtn');
  const frame = document.getElementById('contentFrame');
  const pageTitle = document.getElementById('pageTitle');

  const pageTitles = {
    'pages/home.html': 'Inicio',
    'pages/nueva.html': 'Nueva Oportunidad',
    'pages/modificar.html': 'Modificar Oportunidad',
    'pages/todas.html': 'Ver Todas',
    'pages/estadisticas.html': 'Estadísticas',
    'pages/usuarios.html': 'Gestión de Usuarios',
    'pages/perfil.html': 'Mi Perfil',
  };

  toggleBtn.addEventListener('click', () => {
    sidebar.classList.toggle('collapsed');
  });

  function navigate(btn) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    btn.classList.add('active');
    const page = btn.dataset.page;
    frame.src = page;
    pageTitle.textContent = pageTitles[page] || page;
  }

  // Allow iframes to trigger navigation
  window.navigateTo = function(page) {
    const btn = document.querySelector(`.nav-item[data-page="${page}"]`);
    if (btn) navigate(btn);
  };

  // ── Estado de conexión dinámico ──
  const statusDot  = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  function setStatus(state) {
    statusDot.className = 'status-dot ' + state;
    const labels = {
      sincronizando: 'Sincronizando...',
      conectado:     'Conectado',
      error:         'Sin conexión',
    };
    statusText.textContent = labels[state] || '';
  }

  async function checkConexion() {
    setStatus('sincronizando');
    try {
      const res = await fetch('https://sheetdb.io/api/v1/c3aj6u51o6sn2', {
        method: 'GET', headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        setStatus('conectado');
      } else {
        setStatus('error');
      }
    } catch(e) {
      setStatus('error');
    }
  }

  // Verificar al cargar y cada 60 segundos
  checkConexion();
  setInterval(checkConexion, 60000);

  // Exponer para que las páginas internas puedan actualizar el estado
  window.setConnectionStatus = setStatus;
</script>
</body>
</html>
